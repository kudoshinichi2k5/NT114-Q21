apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: paymentservice-final-cascade
  namespace: online-boutique
spec:
  hosts:
  - paymentservice
  http:
  - fault:
      delay:
        percentage:
          value: 45
        fixedDelay: 1800ms
      abort:
        percentage:
          value: 10
        httpStatus: 500
    route:
    - destination:
        host: paymentservice
