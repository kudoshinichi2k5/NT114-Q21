apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cartservice-v5-fault
  namespace: online-boutique
spec:
  hosts:
  - cartservice
  http:
  - fault:
      delay:
        percentage:
          value: 45
        fixedDelay: 1200ms
      abort:
        percentage:
          value: 8
        httpStatus: 500
    route:
    - destination:
        host: cartservice
