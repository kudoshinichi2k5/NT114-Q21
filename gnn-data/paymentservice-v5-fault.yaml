apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: paymentservice-v5-fault
  namespace: online-boutique
spec:
  hosts:
  - paymentservice
  http:
  - fault:
      delay:
        percentage:
          value: 50
        fixedDelay: 1500ms
      abort:
        percentage:
          value: 10
        httpStatus: 500
    route:
    - destination:
        host: paymentservice
