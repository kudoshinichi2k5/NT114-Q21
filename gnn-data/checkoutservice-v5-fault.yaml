apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: checkoutservice-v5-fault
  namespace: online-boutique
spec:
  hosts:
  - checkoutservice
  http:
  - fault:
      delay:
        percentage:
          value: 35
        fixedDelay: 1000ms
      abort:
        percentage:
          value: 5
        httpStatus: 500
    route:
    - destination:
        host: checkoutservice
